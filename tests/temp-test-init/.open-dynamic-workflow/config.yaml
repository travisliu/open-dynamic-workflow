# Generated by open-dynamic-workflow init.
concurrency: 4
defaultProvider: mock
failFast: false
providers:
  mock:
    args: []
    command: mock
    defaultModel: null
    responses:
      default:
        text: mock response
reporting:
  mode: pretty
  verbose: false
security:
  allowWorkflowImports: false
  passEnv: []
  redactEnv:
    - OPENAI_API_KEY
    - GEMINI_API_KEY
    - GOOGLE_API_KEY
    - "*_KEY"
    - "*_TOKEN"
    - "*_SECRET"
    - PASSWORD
sharedAgents:
  allowDynamicIds: false
  exclude: &a1
    - "**/*.test.*"
    - "**/*.spec.*"
  include:
    - .open-dynamic-workflow/agents/**/*.js
    - .open-dynamic-workflow/agents/**/*.ts
  maxDefinitions: 100
  strictPromptTemplateVariables: true
timeoutMs: 900000
tools:
  concurrency: 4
  exclude: *a1
  include:
    - .open-dynamic-workflow/tools/**/*.js
    - .open-dynamic-workflow/tools/**/*.ts
  maxDefinitions: 100
workflow:
  exclude: *a1
  include:
    - workflows/**/*.workflow.js
    - workflows/**/*.workflow.ts
  maxDepth: 8
  maxLoopRounds: 20
