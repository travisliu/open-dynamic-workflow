defaultProvider: mock
concurrency: 1
timeoutMs: 10000

providers:
  mock:
    command: mock
    responses:
      default:
        text: "mock response"
      review-auth:
        json:
          findings: []
  opencode:
    command: node
    args:
      - tests/fixtures/providers/fake-provider-cli.mjs
    format: json


workflow:
  discovery:
    include:
      - tests/fixtures/workflows/run-by-name/**/*.js
  maxDepth: 5

reporting:
  mode: pretty

security:
  passEnv: []
  redactEnv: []
  allowWorkflowImports: false

sharedAgents:
  dir: tests/fixtures/agents
  maxDefinitions: 100
  allowDynamicIds: false
  strictPromptTemplateVariables: true

tools:
  dir: tests/fixtures/non-existent-tools
